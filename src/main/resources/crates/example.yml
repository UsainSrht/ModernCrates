name: "Example Crate"
animation: "csgo"

key:
  required: true
  material: "TRIPWIRE_HOOK"
  count: 1
  name: "<gold><bold>Example Key"
  lore:
    - "<gray>Use this key to open the"
    - "<gold>Example Crate"
  enchantments:
    UNBREAKING: 1
  item_flags:
    - HIDE_ENCHANTS

item:
  material: "CHEST"
  name: "<gold><bold>Example Crate"
  lore:
    - "<gray>Right-click to place"
    - "<gray>or use in your inventory"

bounce_back: true

hologram:
  lines:
    - "<gold><bold>Example Crate"
    - "<gray>Right-click to open"
  offset:
    - 0.5
    - 1.5
    - 0.5

preview:
  title: "<gold>Preview - Example Crate"
  rows: 6
  fill:
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "
  close:
    slot: 49
    material: "BARRIER"
    name: "<red><bold>Close"
  next:
    slot: 50
    material: "ARROW"
    name: "<green><bold>Next Page"
  previous:
    slot: 48
    material: "ARROW"
    name: "<green><bold>Previous Page"
  sound:
    - "block.chest.open"

announce:
  to_everyone: true
  single: "<gold><player> <gray>won <gold><reward_name> <gray>from the <gold>Example Crate<gray>!"
  multiple: "<gold><player> <gray>won multiple rewards from the <gold>Example Crate<gray>!"
  multiple_item: " <dark_gray>- <gold><reward_name>"

rewards:
  diamond_sword:
    chance: 5.0
    display:
      material: "DIAMOND_SWORD"
      name: "<aqua><bold>Diamond Sword"
      lore:
        - "<gray>A powerful diamond sword!"
        - ""
        - "<yellow>Chance: <gold>5%"
      enchantments:
        SHARPNESS: 3
        UNBREAKING: 2
    items:
      sword:
        material: "DIAMOND_SWORD"
        amount: 1
        name: "<aqua><bold>Diamond Sword"
        enchantments:
          SHARPNESS: 3
          UNBREAKING: 2
    announce: "<gold><player> <gray>won a <aqua><bold>Diamond Sword <gray>from the <gold>Example Crate<gray>!"
  golden_apple:
    chance: 15.0
    display:
      material: "GOLDEN_APPLE"
      name: "<gold>Golden Apples"
      lore:
        - "<gray>A stack of golden apples"
        - ""
        - "<yellow>Chance: <gold>15%"
    items:
      apples:
        material: "GOLDEN_APPLE"
        amount: 8
        name: "<gold>Golden Apple"
  iron_set:
    chance: 25.0
    display:
      material: "IRON_CHESTPLATE"
      name: "<white><bold>Iron Armor Set"
      lore:
        - "<gray>A full set of iron armor"
        - ""
        - "<yellow>Chance: <gold>25%"
    items:
      helmet:
        material: "IRON_HELMET"
        amount: 1
      chestplate:
        material: "IRON_CHESTPLATE"
        amount: 1
      leggings:
        material: "IRON_LEGGINGS"
        amount: 1
      boots:
        material: "IRON_BOOTS"
        amount: 1
  money:
    chance: 30.0
    display:
      material: "GOLD_INGOT"
      name: "<yellow>$1000"
      lore:
        - "<gray>A nice sum of money"
        - ""
        - "<yellow>Chance: <gold>30%"
    commands:
      - "eco give <player> 1000"
  common_reward:
    chance: 25.0
    display:
      material: "COAL"
      name: "<gray>Coal"
      lore:
        - "<gray>Better luck next time!"
        - ""
        - "<yellow>Chance: <gold>25%"
    items:
      coal:
        material: "COAL"
        amount: 16
