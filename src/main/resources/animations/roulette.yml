type: CSGO

# Classic slot-machine roulette: reward items scroll across the middle row.
# The win zone pointer sits at index 5 (the center slot, slot 13 in the middle row).
# Custom filler items give the GUI a shiny, high-energy casino feel.
# End-of-animation beacons pulse at the corners to celebrate the win.
gui_title: "<aqua><bold>⚡ Roulette Crate ⚡"
gui_rows: 3
gui_fill:
  material: "CYAN_STAINED_GLASS_PANE"
  name: " "

total_ticks: 60
stay_open_after_reward_ticks: 80
start_tick_rate: 1
tick_rate_modifier: 15
reward_index: 5

reward_slots:
  - 9
  - 10
  - 11
  - 12
  - 13
  - 14
  - 15
  - 16
  - 17

filler_slots:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  - 18
  - 19
  - 20
  - 21
  - 22
  - 23
  - 24
  - 25
  - 26

filler_items:
  trophy:
    material: "NETHER_STAR"
    name: "<yellow>★ Trophy"
  coin:
    material: "GOLD_NUGGET"
    name: "<gold>✦ Coin"
  gem:
    material: "AMETHYST_SHARD"
    name: "<light_purple>◆ Gem"
  crystal:
    material: "PRISMARINE_CRYSTALS"
    name: "<aqua>❋ Crystal"
  shard:
    material: "QUARTZ"
    name: "<white>◈ Shard"

pointers:
  down:
    slot: 4
    material: "LIME_STAINED_GLASS_PANE"
    name: "<green><bold>▼ WIN ZONE ▼"
  up:
    slot: 22
    material: "LIME_STAINED_GLASS_PANE"
    name: "<green><bold>▲ WIN ZONE ▲"

end_of_the_animation_item:
  material: "BEACON"
  name: "<green><bold>★ WINNER! ★"
  lore:
    - "<gray>Congratulations on your win!"
end_of_the_animation_slots:
  - 0
  - 2
  - 6
  - 8
  - 18
  - 20
  - 24
  - 26

sounds:
  tick:
    - "block.note_block.hat"
  reward:
    - "entity.player.levelup"
