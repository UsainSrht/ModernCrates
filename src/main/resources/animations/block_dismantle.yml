type: block_dismantle

# ╔══════════════════════════════════════════════════════════════╗
# ║             Block Dismantle Animation Config                ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  A physical-crate-only animation. The crate block is        ║
# ║  temporarily hidden and replaced by 6 thin BlockDisplay     ║
# ║  entities forming its shell. The top face launches upward   ║
# ║  in a random direction, the four sides fall outward, and    ║
# ║  the bottom stays put. Reward items appear inside the open  ║
# ║  cavity as ItemDisplay entities.                            ║
# ║                                                             ║
# ║  NOTE: Requires a physical crate location. Without one,     ║
# ║  the animation falls back to an instant reward grant.       ║
# ╚══════════════════════════════════════════════════════════════╝

# The block material that the shell faces will use.
# Must be a solid block material (e.g. BARREL, CHEST, OBSIDIAN).
dismantle_block_type: "BARREL"

# How many ticks the side faces take to fall to the ground.
dismantle_fall_duration_ticks: 35

# How many ticks the top face takes to rise to its peak.
# After this duration it will begin falling back down over
# an equal number of ticks.
dismantle_top_rise_duration_ticks: 22

# How high (in blocks) the top face rises above the crate block.
dismantle_top_launch_height: 3.5

# Maximum horizontal offset (in blocks) the top face drifts in a
# random direction. Adds a natural, unpredictable feel.
dismantle_top_horizontal_range: 1.8

# How many ticks the reward ItemDisplay entity is visible
# before everything is cleaned up and the block is restored.
dismantle_display_duration_ticks: 100

# ── Particles ─────────────────────────────────────────────────────
# Particles to burst around the block the instant the faces start to
# fall. Accepts any bukkit Particle enum name (case-insensitive).
# Use a list for multiple particle types at once.
# Common examples: SWEEP_ATTACK, EXPLOSION_NORMAL, CRIT, FLASH,
#                  FIREWORKS_SPARK, SPELL_WITCH, TOTEM
dismantle_particles:
  - "SWEEP_ATTACK"
  - "CRIT"

# ── Sounds ────────────────────────────────────────────────────────
# Played when the block shell first explodes/dismantles.
dismantle_open_sound:
  - "block.wood.break"
  - "entity.ender_chest.open"

# Played when the reward items appear inside the cavity.
dismantle_reward_sound:
  - "entity.player.levelup"

# Played just before cleanup (close/restore phase).
dismantle_settle_sound:
  - "block.chest.close"

